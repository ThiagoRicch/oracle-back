name: Internal Jobs Cron

on:
  schedule:
    # GitHub Actions nao permite granularidade de 1 minuto e o free tier e
    # conhecido por atrasar/pular runs em horarios de pico. Mantemos 3 crons
    # defasados para triplicar a frequencia efetiva (~1-2 min entre tentativas).
    - cron: "*/5 * * * *"
    - cron: "1-59/5 * * * *"
    - cron: "3-59/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: internal-jobs-cron-${{ github.event.schedule || 'manual' }}
  cancel-in-progress: false

jobs:
  trigger-internal-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate required secrets
        env:
          BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
          INTERNAL_CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${BACKEND_BASE_URL:-}" ]; then
            echo "Secret BACKEND_BASE_URL nao configurado"
            exit 1
          fi
          if [ -z "${INTERNAL_CRON_SECRET:-}" ]; then
            echo "Secret INTERNAL_CRON_SECRET nao configurado"
            exit 1
          fi

      - name: Trigger daily, monthly and solar jobs
        env:
          BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
          INTERNAL_CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
        run: |
          set -euo pipefail
          BASE_URL="${BACKEND_BASE_URL%/}"

          # Retry agressivo: 6 tentativas x 10s = ate 60s de espera,
          # suficiente para absorver cold start do Render Free (~20-30s).
          call_job() {
            local endpoint="$1"
            echo "Chamando ${BASE_URL}${endpoint}"
            curl --silent --show-error --fail \
              --request POST \
              --retry 6 \
              --retry-delay 10 \
              --retry-all-errors \
              --retry-connrefused \
              --max-time 180 \
              --header "Authorization: Bearer ${INTERNAL_CRON_SECRET}" \
              "${BASE_URL}${endpoint}" || {
                echo "Falha ao chamar ${endpoint} apos retries; continuando para nao bloquear proximos jobs"
                return 0
              }
            echo
          }

          call_job "/internal/jobs/daily"
          call_job "/internal/jobs/monthly"
          call_job "/internal/jobs/solar"

      - name: Trigger weather job every 30 minutes
        env:
          BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
          INTERNAL_CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
        run: |
          set -euo pipefail
          minute="$(date -u +%M)"
          minute=$((10#$minute))

          # Permite minuto 0, 1, 2, 3 e 30, 31, 32, 33 para cobrir os 3 crons defasados
          if [ $((minute % 30)) -gt 3 ]; then
            echo "Pulando weather job neste ciclo (minuto UTC atual: ${minute})"
            exit 0
          fi

          BASE_URL="${BACKEND_BASE_URL%/}"
          echo "Chamando ${BASE_URL}/internal/jobs/weather"
          curl --silent --show-error --fail \
            --request POST \
            --retry 6 \
            --retry-delay 10 \
            --retry-all-errors \
            --retry-connrefused \
            --max-time 180 \
            --header "Authorization: Bearer ${INTERNAL_CRON_SECRET}" \
            "${BASE_URL}/internal/jobs/weather" || {
              echo "Falha ao chamar /internal/jobs/weather apos retries"
              exit 0
            }
          echo
